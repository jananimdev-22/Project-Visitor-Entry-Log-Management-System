<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visitor Log Options</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { 
            background: #f5f7fa; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        /* ===== Navbar ===== */
        .navbar {
            background-color: #1e3a8a;
        }

        .navbar .nav-link {
            color: #fff;
            margin-right: 15px;
            transition: color 0.3s;
        }

        .navbar .nav-link:hover {
            color: #3b82f6;
        }

        .navbar .navbar-brand {
            color: #fff;
            font-size: 1.5rem;
        }

        .navbar .navbar-toggler {
            border-color: #fff;
        }
        .option-card {
            border-radius: 15px;
            padding: 40px;
            background: #fff;
            box-shadow: 0 6px 18px rgba(0,0,0,0.1);
            text-align: center;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .option-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 25px rgba(0,0,0,0.15);
        }
        .option-btn {
            padding: 12px 25px;
            font-size: 1.1rem;
            margin-top: 20px;
            border-radius: 10px;
            text-decoration: none;
            color: #fff;
        }
        .staff-btn { background: #1e40af; }
        .staff-btn:hover { background: #3b82f6; }
        .visitor-btn { background: #059669; }
        .visitor-btn:hover { background: #10b981; }
    </style>
</head>
<body>
    <!-- ===== Navbar ===== -->
<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="#">Healthy Life Clinic :)</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#clinicNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="clinicNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="{% url 'home' %}">Home</a></li>
                <li class="nav-item"><a class="nav-link active" href="{% url 'services' %}">Services</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'about' %}">About</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'contact' %}">Contact</a></li>
                <li class="nav-item">
                    <a class="nav-link " href="{% url 'visitor_action' %}">Visitor Log</a>
                </li>
            </ul>
        </div>
    </div>
</nav>
<div class="container my-5">
    <h2 class="text-center mb-5" style="color:#1e3a8a;">Visitor Log</h2>
    <div class="row justify-content-center g-4">
        <div class="col-md-5">
            <div class="option-card">
                <h4>Staff Access</h4>
                <p>Edit, update, or delete visitor logs. Staff only.</p>
                <a href="/staff-login/" class="option-btn staff-btn">Staff Page</a>
            </div>
        </div>
        <div class="col-md-5">
            <div class="option-card">
                <h4>Visitor Entry</h4>
                <p>Fill the visitor form to add your details.</p>
                <a href="/add-visitor/" class="option-btn visitor-btn">Add Visitor</a>
            </div>
        </div>
    </div>
</div>
<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
